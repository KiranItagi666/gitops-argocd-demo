---
# Source: gitops-argocd-demo-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo-gitops-argocd-demo-chart
  labels:
    helm.sh/chart: gitops-argocd-demo-chart-0.1.0
    app.kubernetes.io/name: gitops-argocd-demo-chart
    app.kubernetes.io/instance: gitops-demo
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-argocd-demo-chart
      app.kubernetes.io/instance: gitops-demo
  template:
    metadata:
      labels:
        helm.sh/chart: gitops-argocd-demo-chart-0.1.0
        app.kubernetes.io/name: gitops-argocd-demo-chart
        app.kubernetes.io/instance: gitops-demo
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: gitops-argocd-demo-chart
          image: "gitops-argocd-demo:v1"
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
